# r cmd check workflow of the mlr3 ecosystem v0.6.0
# You can remove the `services.redis` section if the package does not require `rush` for the tests
# https://github.com/mlr-org/actions
on:
  workflow_dispatch:
    inputs:
      debug_enabled:
        type: boolean
        description: 'Run the build with tmate debugging enabled'
        required: false
        default: false
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

name: r-cmd-check

jobs:
  r-cmd-check:
    runs-on: ${{ matrix.config.os }}
    services:
      redis:
        image: redis
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RUSH_TEST_USE_REDIS: true

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: ubuntu-latest,   r: 'devel'}
          - {os: ubuntu-latest,   r: 'release'}

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: astral-sh/setup-uv@v5

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: actions/cache@v4
        with:
          path: ~/.virtualenvs
          key: venvs-${{ runner.os }}-${{ hashFiles('.github/workflows/r-cmd-check.yml') }}
          restore-keys: venvs-${{ runner.os }}-

      - name: Create Python virtual environments
        run: |
          uv venv ~/.virtualenvs/r-hebo
          uv pip install --python ~/.virtualenvs/r-hebo torch --index-url https://download.pytorch.org/whl/cpu git+https://github.com/huawei-noah/HEBO.git#subdirectory=HEBO --quiet
          uv venv ~/.virtualenvs/r-smac
          uv pip install --python ~/.virtualenvs/r-smac smac ConfigSpace --quiet
          uv venv ~/.virtualenvs/r-optuna
          uv pip install --python ~/.virtualenvs/r-optuna optuna --quiet

      - uses: mxschmitt/action-tmate@v3
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.debug_enabled }}
        with:
          limit-access-to-actor: true

      - uses: r-lib/actions/check-r-package@v2
        with:
          error-on: '"note"'
          args: 'c("--no-manual", "--as-cran")'
